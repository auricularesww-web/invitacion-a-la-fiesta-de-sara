<html lang="es">
<head>
    <!-- Tu CSS está perfecto, no necesita cambios -->
    <style>
        /* ... todo tu CSS igual ... */
    </style>
</head>
<body>
    <!-- Tu HTML está perfecto, no necesita cambios -->
    <div class="container" id="mainContainer">
        <!-- ... todo tu HTML igual ... -->
    </div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    // 🔥 CONFIGURACIÓN FIREBASE (CORRECTA)
    const firebaseConfig = {
        apiKey: "AIzaSyC7DN_UnzpCnkWZxmgHDsXBTefx0DOZ-Pc",
        authDomain: "cumple-de-sara.firebaseapp.com",
        databaseURL: "https://cumple-de-sara-default-rtdb.firebaseio.com",
        projectId: "cumple-de-sara",
        storageBucket: "cumple-de-sara.firebasestorage.app",
        messagingSenderId: "552258745730",
        appId: "1:552258745730:web:e9fe5ec73e1dbf7bcb4b9b"
    };

    // ✅ INICIALIZAR FIREBASE CORRECTAMENTE
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const guestsRef = db.ref('confirmedGuests');
    const noGuestsRef = db.ref('noAttendingGuests');
    const dietsRef = db.ref('specialDiets');
    const songsRef = db.ref('partySongs');
    
    let currentGuest = null;
    let selectedDiet = null;
    let songSaved = false;

    // ✅ FUNCIÓN NO ASISTIR (FUNCIONA)
    function noAttend() {
        const name = prompt('😔 ¿Cómo te llamás?');
        if (name && name.trim()) {
            noGuestsRef.once('value').then((snapshot) => {
                const noGuests = snapshot.val() ? Object.values(snapshot.val()) : [];
                if (!noGuests.includes(name.trim())) {
                    noGuestsRef.push(name.trim());
                    alert(`😢 Gracias por avisar ${name.trim()}! 💕\n\n¡Te vamos a extrañar en la fiesta!`);
                    document.getElementById('confirmBtn').style.display = 'none';
                    document.getElementById('noAttendBtn').style.display = 'none';
                } else {
                    alert('😅 Ya habías confirmado que no venís!');
                }
            });
        }
    }

    // Navegación
    function showGuestView() {
        document.getElementById('welcomeScreen').style.display = 'none';
        document.getElementById('guestView').style.display = 'block';
    }

    function backToWelcome() {
        document.getElementById('welcomeScreen').style.display = 'block';
        document.getElementById('guestView').style.display = 'none';
        resetForms();
    }

    function resetForms() {
        document.getElementById('confirmBtn').style.display = 'block';
        document.getElementById('noAttendBtn').style.display = 'block';
        document.getElementById('nameForm').classList.remove('active');
        document.getElementById('successMsg').style.display = 'none';
        document.getElementById('mainButtons').style.display = 'none';
        document.getElementById('dietForm').classList.remove('active');
        document.getElementById('songForm').classList.remove('active');
        document.getElementById('fullName').value = '';
        document.getElementById('songInput').value = '';
        selectedDiet = null;
        songSaved = false;
        document.getElementById('saveDietBtn').disabled = true;
        document.getElementById('saveSongBtn').disabled = true;
        document.querySelectorAll('.diet-option').forEach(opt => opt.classList.remove('selected'));
    }

    // ✅ BOTÓN CONFIRMAR ASISTENCIA
    document.getElementById('confirmBtn').onclick = function() {
        document.getElementById('confirmBtn').style.display = 'none';
        document.getElementById('noAttendBtn').style.display = 'none';
        document.getElementById('nameForm').classList.add('active');
        document.getElementById('fullName').focus();
    };

    // ✅ FUNCIÓN GUARDAR INVITADO (ESTABA INCOMPLETA)
    function saveGuest() {
        const name = document.getElementById('fullName').value.trim();
        if (name) {
            guestsRef.once('value').then((snapshot) => {
                const guests = snapshot.val() ? Object.values(snapshot.val()) : [];
                if (!guests.includes(name)) {
                    // Guardar invitado
                    guestsRef.push(name);
                    currentGuest = name;
                    
                    // Mostrar éxito
                    document.getElementById('savedName').textContent = name;
                    document.getElementById('successMsg').style.display = 'block';
                    document.getElementById('nameForm').classList.remove('active');
                    document.getElementById('mainButtons').style.display = 'block';
                    
                    // Ocultar formulario de nombre
                    setTimeout(() => {
                        document.getElementById('mainButtons').style.display = 'block';
                    }, 1500);
                } else {
                    alert('😅 Ya habías confirmado tu asistencia!');
                    resetForms();
                }
            }).catch(error => {
                console.error('Error:', error);
                alert('❌ Error al guardar. Intenta de nuevo.');
            });
        } else {
            alert('Por favor, escribí tu nombre completo');
        }
    }

    // ✅ FUNCIONES CANCIÓN
    function showSongForm() {
        if (!currentGuest) {
            alert('😅 Primero confirmá tu asistencia');
            return;
        }
        document.getElementById('mainButtons').style.display = 'none';
        document.getElementById('songForm').classList.add('active');
        document.getElementById('songInput').focus();
    }

    function hideSongForm() {
        document.getElementById('songForm').classList.remove('active');
        document.getElementById('mainButtons').style.display = 'block';
        document.getElementById('songInput').value = '';
        document.getElementById('saveSongBtn').disabled = true;
    }

    document.getElementById('songInput').addEventListener('input', function() {
        document.getElementById('saveSongBtn').disabled = this.value.trim().length < 3;
    });

    function saveSong() {
        const song = document.getElementById('songInput').value.trim();
        if (song && currentGuest) {
            songsRef.push(`${currentGuest}: ${song}`);
            document.getElementById('successMsg').innerHTML = `
                ✅ ¡Tu asistencia ha sido confirmada! Dress Code: Elegante sport 
                <br><strong>${currentGuest}</strong>
                <br>🎵 Canción guardada: <strong>${song}</strong> ✨
            `;
            document.getElementById('successMsg').className = 'success song-success';
            document.getElementById('successMsg').style.display = 'block';
            hideSongForm();
            songSaved = true;
        }
    }

    // ✅ FUNCIONES DIETA
    function selectDiet(diet) {
        selectedDiet = diet;
        document.querySelectorAll('.diet-option').forEach(opt => opt.classList.remove('selected'));
        event.target.classList.add('selected');
        document.getElementById('saveDietBtn').disabled = false;
    }

    function showDietForm() {
        if (!currentGuest) {
            alert('😅 Primero confirmá tu asistencia');
            return;
        }
        document.getElementById('mainButtons').style.display = 'none';
        document.getElementById('dietForm').classList.add('active');
    }

    function hideDietForm() {
        document.getElementById('dietForm').classList.remove('active');
        document.getElementById('mainButtons').style.display = 'block';
        resetDietSelection();
    }

    function resetDietSelection() {
        selectedDiet = null;
        document.getElementById('saveDietBtn').disabled = true;
        document.querySelectorAll('.diet-option').forEach(opt => opt.classList.remove('selected'));
    }

    function saveDiet() {
        if (selectedDiet && currentGuest) {
            dietsRef.child(currentGuest).set(selectedDiet);
            alert(`✅ Dieta ${selectedDiet} guardada para ${currentGuest}!`);
            hideDietForm();
        }
    }

    // ✅ MAPAS
    function openMaps() {
        window.open('https://maps.app.goo.gl/ABC123', '_blank');
    }

    // ✅ ESCUCHAR ENTER EN INPUTS
    document.getElementById('fullName').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') saveGuest();
    });

    console.log('✅ ¡Página cargada correctamente!');
</script>
</body>
</html>
